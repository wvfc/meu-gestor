name: Build & Release APK

on:
  push:
    branches: [ main, 'claude/*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/MeuGestor-v1.0.0-debug.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MeuGestor-debug-apk
          path: artifacts/MeuGestor-v1.0.0-debug.apk
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: MeuGestor-debug-apk

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0-build.${{ steps.date.outputs.date }}
          name: "Meu Gestor v1.0.0 (Build ${{ steps.date.outputs.date }})"
          body: |
            ## Meu Gestor - Gestao Financeira Pessoal

            APK pronto para instalar no seu Android.

            ### Como instalar:
            1. Baixe o arquivo **MeuGestor-v1.0.0-debug.apk** abaixo
            2. No celular, habilite "Instalar de fontes desconhecidas"
            3. Abra o arquivo APK baixado no celular
            4. Toque em Instalar

            ### Requisitos:
            - Android 8.0 (Oreo) ou superior
          files: MeuGestor-v1.0.0-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
